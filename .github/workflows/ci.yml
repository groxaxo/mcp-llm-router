name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test dependencies
        run: python -m pip install -U pip && python -m pip install -e .[test]
      - name: Auto-installer dry run
        run: python3 scripts/auto_install.py --dry-run
      - name: Run regression tests
        run: python -m pytest tests/test_deepseek_routing.py tests/test_judge_defaults.py tests/test_release_metadata.py
