name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test dependencies
        run: python -m pip install -U pip && python -m pip install -e .[test]
      - name: Auto-installer dry run
        run: python3 scripts/auto_install.py --dry-run
      - name: Run test suite
        run: python -m pytest -q

  packaging-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package + test dependencies
        run: python -m pip install -U pip && python -m pip install -e .[test]
      - name: Verify importability
        run: python scripts/verify_server.py
      - name: Inspector smoke check
        run: python scripts/inspector_smoke.py
      - name: Verify packaging metadata and CLI
        run: |
          python -m pip install . --no-deps
          python - <<'PY'
          import importlib.metadata
          import mcp_llm_router
          import mcp_llm_router.cli
          assert importlib.metadata.version("mcp_llm_router") == mcp_llm_router.__version__
          print("CLI entrypoint module imported successfully.")
          PY
